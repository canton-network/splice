svApp:
  additionalEnvVars:
    - name: ADDITIONAL_CONFIG_PROTOCOL_VERSION
      value: |
        canton.sv-apps.sv.local-synchronizer-nodes.current.protocol-version = "35"
    - name: ADDITIONAL_CONFIG_BFT_SEQUENCING_PARAMETERS
      value: |
        canton.sv-apps.sv.bft-sequencing-parameters = { pbft-view-change-timeout = 5s, segment-length = 10, blacklist-leader-selection-policy-config = { how-long-to-blacklist = { type = "linear", maximum-epoch-blacklisted = 250 }, how-many-can-we-blacklist = "num-faults-tolerated", } }
sequencer:
  cloudSql:
    tier: 'db-perf-optimized-N-8'
    enterprisePlus: true
    flags:
      max_wal_size: '20480' # 20GB, but GCP doesn't allow to write it that way and must be a number indicating MB
      maintenance_work_mem: '2000000' # 2Gi, but GCP doesn't allow to write it that way and must be a number indicating KB
participant:
  bftSequencerConnection: false
