imageRepo: "ghcr.io/digital-asset/decentralized-canton-sync/docker"
docs:
  imageName: "docs"
gcsProxy:
  imageName: "gcs-proxy"

enableGcsProxy: false

# should stakater reloader annotation be added (note: reloader needs to be installed separately)
enableReloader: true

# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:

# k8s tolerations for all deployed pods (optional)
# tolerations:
service:
  http:
    port: 80


securityContexts:
  pod:
    seccompProfile:
      type: RuntimeDefault
  docs:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL
  gcsProxy:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL
