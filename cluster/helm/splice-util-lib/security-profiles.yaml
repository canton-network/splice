profiles:
  pod_security_context:
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  app_security_context:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL

  ui_security_context:
    # runAsUser, runAsGroup, and runAsNonRoot are intentionally omitted
    # to prevent entrypoint initialization script crashes (Exit Code 126)
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL

  persistent_security_context:
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL
