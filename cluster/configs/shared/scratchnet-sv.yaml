!include(base-sv.yaml)
pruning:
  cometbft:
    retainBlocks: 2000 # corresponds to a retention period of ~2 hours
svApp:
  resources:
    limits:
      cpu: "3"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 2Gi
scanApp:
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: "2"
      memory: 2Gi
participant:
  resources:
    requests:
      cpu: "1"
sequencer:
  # formerly the effect of `SEQUENCER_LOW_RESOURCES=true`
  resources:
    limits:
      memory: 10Gi
    requests:
      cpu: "4"
      memory: 4Gi
  additionalEnvVars:
    - name: ADDITIONAL_CONFIG_DABFT_SCALE_SETTINGS
      value: |
        canton.sequencers.sequencer.sequencer.config {
          consensus-empty-block-creation-timeout = 500.milliseconds
          min-requests-in-batch = 16
        }
    - name: ADDITIONAL_CONFIG_HIGH_THROUGHPUT_SETTINGS
      value: |
        canton.sequencers.sequencer.sequencer.block.throughput-cap {
          enabled = true
          messages = {
            confirmation-request = {
              global-tps-cap = 100
              per-client-tps-cap = 60
              global-kbps-cap = 20000
              per-client-kbps-cap = 12000
            }
            topology = {
              global-tps-cap = 200
              per-client-tps-cap = 10
              global-kbps-cap = 2000
              per-client-kbps-cap = 500
            }
          }
          strict = false
        }
mediator:
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 2Gi
cometbft:
  resources:
    limits:
      memory: 4Gi
    requests:
      memory: 2Gi
